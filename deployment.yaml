apiVersion: apps/v1
kind: Deployment

metadata:
  name: node-deployment

spec:
  replicas: 2

  selector:
    matchLabels:
      app: node-app

  template:
    metadata:
      labels:
        app: node-app

    spec:
      containers:
      - name: node-app
        image: node-devops-app
        imagePullPolicy: Never

        ports:
        - containerPort: 3000
